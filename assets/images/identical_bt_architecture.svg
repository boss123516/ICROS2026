<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" role="img" aria-label="Identical Behavior Tree architecture">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f9ff"/>
      <stop offset="1" stop-color="#dcecff"/>
    </linearGradient>
    <filter id="s" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#092e70" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1100" height="420" rx="34" fill="url(#g)"/>
  <text x="550" y="56" text-anchor="middle" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="800" fill="#082b66">Identical BT</text>
  <text x="550" y="86" text-anchor="middle" font-size="16" font-family="Inter, Arial, sans-serif" fill="#51647f">Same local behavior tree executed by every robot</text>
  <g filter="url(#s)">
    <rect x="80" y="155" width="230" height="98" rx="18" fill="#ffffff" stroke="#c6d8f5" stroke-width="2"/>
    <rect x="435" y="155" width="230" height="98" rx="18" fill="#ffffff" stroke="#c6d8f5" stroke-width="2"/>
    <rect x="790" y="155" width="230" height="98" rx="18" fill="#ffffff" stroke="#c6d8f5" stroke-width="2"/>
  </g>
  <path d="M310 204 H420" stroke="#0b4aa2" stroke-width="5" stroke-linecap="round"/>
  <path d="M665 204 H775" stroke="#0b4aa2" stroke-width="5" stroke-linecap="round"/>
  <path d="M420 204 l-18 -10 v20z" fill="#0b4aa2"/>
  <path d="M775 204 l-18 -10 v20z" fill="#0b4aa2"/>
  <text x="195" y="190" text-anchor="middle" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="800" fill="#082b66">Contribution Check</text>
  <text x="195" y="220" text-anchor="middle" font-size="15" font-family="Inter, Arial, sans-serif" fill="#5d6c82">Can this robot help?</text>
  <text x="550" y="190" text-anchor="middle" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="800" fill="#082b66">Assign Check</text>
  <text x="550" y="220" text-anchor="middle" font-size="15" font-family="Inter, Arial, sans-serif" fill="#5d6c82">Resolve task-level conflicts</text>
  <text x="905" y="190" text-anchor="middle" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="800" fill="#082b66">Problem Solving BT</text>
  <text x="905" y="220" text-anchor="middle" font-size="15" font-family="Inter, Arial, sans-serif" fill="#5d6c82">Execute the assigned task</text>
  <path d="M195 253 C195 315 110 306 110 356" stroke="#e34c4c" stroke-width="3" stroke-dasharray="8 8" fill="none"/>
  <text x="142" y="374" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#e34c4c" font-weight="700">Failure → wait</text>
  <path d="M550 253 C550 315 462 306 462 356" stroke="#e34c4c" stroke-width="3" stroke-dasharray="8 8" fill="none"/>
  <text x="500" y="374" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#e34c4c" font-weight="700">Failure → wait</text>
  <path d="M905 253 C905 315 996 306 996 356" stroke="#21a67a" stroke-width="3" stroke-dasharray="8 8" fill="none"/>
  <text x="952" y="374" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#21a67a" font-weight="700">Success → task done</text>
</svg>
